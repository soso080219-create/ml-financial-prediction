<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가격 예측 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold text-white mb-4">가격 예측 시스템</h1>
            <p class="text-xl text-white opacity-90">주식 또는 비트코인 예측을 선택하세요</p>
        </div>
        
        <div class="grid md:grid-cols-2 gap-8">
            <!-- 주식 예측 카드 -->
            <div class="card-hover bg-white rounded-2xl p-8 text-center shadow-xl">
                <div class="mb-6">
                    <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-3">주식 예측</h2>
                    <p class="text-gray-600 mb-6">한국 주요 10개 기업의 내일 종가 상승/하락을 예측합니다</p>
                    <div class="text-sm text-gray-500 mb-6">
                        <p>• LS, LG, 한화, KT&G, 신한지주</p>
                        <p>• 삼성전자, 현대모비스, 카카오페이</p>
                        <p>• POSCO, SK이노베이션</p>
                    </div>
                </div>
                <button onclick="location.href='/stock'" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors">
                    주식 예측하기
                </button>
            </div>
            
            <!-- 비트코인 예측 카드 -->
            <div class="card-hover bg-white rounded-2xl p-8 text-center shadow-xl">
                <div class="mb-6">
                    <div class="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-10 h-10 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-3">비트코인 예측</h2>
                    <p class="text-gray-600 mb-6">비트코인의 1시간 후 또는 1일 후 가격을 예측합니다</p>
                    <div class="text-sm text-gray-500 mb-6">
                        <p>• 실시간 데이터 기반 예측</p>
                        <p>• 기술적 지표 분석</p>
                        <p>• 과거 가격 차트 제공</p>
                    </div>
                </div>
                <button onclick="location.href='/bitcoin'" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors">
                    비트코인 예측하기
                </button>
            </div>
        </div>
        
        <div class="text-center mt-12">
            <p class="text-white opacity-75 text-sm">
                ※ 이 예측은 학습된 모델에 기반한 것이며, 실제 결과와 다를 수 있습니다. 투자 결정 시 참고용으로만 사용하세요.
            </p>
        </div>
    </div>
</body>
</html>
